<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f0f9ff" />
  
  <!-- Sky -->
  <rect width="800" height="150" fill="#3b82f6" />
  
  <!-- Sun -->
  <circle cx="700" cy="80" r="40" fill="#facc15" />
  
  <!-- Ground -->
  <rect y="300" width="800" height="100" fill="#15803d" />
  
  <!-- School Building -->
  <rect x="200" y="150" width="400" height="150" fill="#ef4444" />
  
  <!-- Roof -->
  <polygon points="200,150 400,80 600,150" fill="#1e293b" />
  
  <!-- Windows -->
  <rect x="230" y="180" width="50" height="50" fill="#bfdbfe" />
  <rect x="300" y="180" width="50" height="50" fill="#bfdbfe" />
  <rect x="370" y="180" width="50" height="50" fill="#bfdbfe" />
  <rect x="440" y="180" width="50" height="50" fill="#bfdbfe" />
  <rect x="510" y="180" width="50" height="50" fill="#bfdbfe" />
  
  <!-- Door -->
  <rect x="360" y="230" width="70" height="70" fill="#1e293b" />
  
  <!-- Door Handle -->
  <circle cx="415" cy="265" r="5" fill="#facc15" />
  
  <!-- Flagpole -->
  <rect x="600" y="100" width="5" height="200" fill="#1e293b" />
  <rect x="605" y="100" width="30" height="20" fill="#ff9f1c" />
  
  <!-- School Name -->
  <text x="400" y="340" font-family="Arial" font-size="24" fill="#ffffff" text-anchor="middle">JAI GOVIND PUBLIC SCHOOL</text>
</svg> 