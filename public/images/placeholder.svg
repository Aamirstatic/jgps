<!-- This is a placeholder SVG for school images -->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background with school color -->
  <rect width="800" height="500" fill="#035c00" />
  
  <!-- School building icon -->
  <rect x="300" y="200" width="200" height="150" fill="white" stroke="#024700" stroke-width="8" />
  <rect x="350" y="300" width="100" height="50" fill="white" stroke="#024700" stroke-width="8" />
  <polygon points="300,200 400,100 500,200" fill="white" stroke="#024700" stroke-width="8" />
  
  <!-- Windows -->
  <rect x="320" y="220" width="40" height="40" fill="#024700" />
  <rect x="440" y="220" width="40" height="40" fill="#024700" />
  <rect x="320" y="280" width="40" height="40" fill="#024700" />
  <rect x="440" y="280" width="40" height="40" fill="#024700" />
  
  <!-- Text -->
  <text x="400" y="400" font-family="Arial" font-size="24" fill="white" text-anchor="middle">School Image Placeholder</text>
</svg> 