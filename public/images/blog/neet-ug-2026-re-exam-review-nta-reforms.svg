      <text x="25" y="5" text-anchor="middle" font-size="20">📅</text>
      <text x="25" y="40" text-anchor="middle" font-size="13" fill="#4a5568" font-family="Arial, sans-serif">2027 Prep</text>
    </g>
  
  <!-- Bottom bar text -->
  <text x="600" y="610" text-anchor="middle" font-size="12" fill="white" font-family="Arial, sans-serif">Jai Govind Public School — jgps.in</text>
