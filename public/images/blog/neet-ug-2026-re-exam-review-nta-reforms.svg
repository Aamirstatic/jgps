  <text x="60" y="220" font-size="30" fill="#4a5568" font-family="Arial, sans-serif">Re-Exam Review & NTA Reforms</text>
  
  <!-- Divider -->
  <rect x="60" y="260" width="200" height="4" rx="2" fill="#e53e3e"/>
  
  <!-- Info box -->
  <rect x="60" y="300" width="500" height="180" rx="12" fill="#1a365d08" stroke="#1a365d20" stroke-width="1"/>
  <text x="80" y="340" font-size="16" fill="#1a365d" font-weight="bold" font-family="Arial, sans-serif">Key Highlights</text>
  <text x="80" y="375" font-size="14" fill="#4a5568" font-family="Arial, sans-serif">• Complete analysis and expert insights</text>
  <text x="80" y="405" font-size="14" fill="#4a5568" font-family="Arial, sans-serif">• Step-by-step preparation strategies</text>
  <text x="80" y="435" font-size="14" fill="#4a5568" font-family="Arial, sans-serif">• What parents need to know right now</text>
  <text x="80" y="465" font-size="14" fill="#4a5568" font-family="Arial, sans-serif">• Official links and important dates</text>
  
  <!-- Right side decoration -->
  <circle cx="900" cy="200" r="150" fill="#e53e3e10"/>
  <circle cx="950" cy="250" r="100" fill="#1a365d10"/>
  
  <!-- Bottom icons -->
  
    <g transform="translate(60, 520)">
      <circle cx="25" cy="0" r="20" fill="#e53e3e20"/>
      <text x="25" y="5" text-anchor="middle" font-size="20">📋</text>
      <text x="25" y="40" text-anchor="middle" font-size="13" fill="#4a5568" font-family="Arial, sans-serif">Parliament</text>
    </g>
    <g transform="translate(330, 520)">
      <circle cx="25" cy="0" r="20" fill="#e53e3e20"/>
      <text x="25" y="5" text-anchor="middle" font-size="20">📝</text>
      <text x="25" y="40" text-anchor="middle" font-size="13" fill="#4a5568" font-family="Arial, sans-serif">NTA Reforms</text>
    </g>
    <g transform="translate(600, 520)">
      <circle cx="25" cy="0" r="20" fill="#e53e3e20"/>
      <text x="25" y="5" text-anchor="middle" font-size="20">📚</text>
      <text x="25" y="40" text-anchor="middle" font-size="13" fill="#4a5568" font-family="Arial, sans-serif">Student Safety</text>
    </g>
    <g transform="translate(870, 520)">
