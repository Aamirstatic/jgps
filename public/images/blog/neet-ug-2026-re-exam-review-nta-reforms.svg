<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f7fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>
  <rect x="0" y="580" width="1200" height="50" fill="#1a365d"/>
  
  <!-- Badge -->
  <rect x="60" y="60" width="180" height="40" rx="20" fill="#e53e3e"/>
  <text x="150" y="85" text-anchor="middle" font-size="14" fill="white" font-weight="bold" font-family="Arial, sans-serif">JULY 1 REVIEW</text>
  
  <!-- Title -->
